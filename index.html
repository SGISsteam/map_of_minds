<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom World Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }

        .student-popup img {
            width: 100%;
            max-width: 200px;
            border-radius: 8px;
            display: block;
            margin-bottom: 10px;
        }
        .student-popup h3 { margin: 0 0 5px 0; color: #333; }
        .student-popup p { margin: 0; font-size: 14px; line-height: 1.4; color: #666; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
    const map = L.map('map', {
        minZoom: 3, 
        maxZoom: 18,
        maxBounds: [[-90, -180], [90, 180]],
        maxBoundsViscosity: 1.0 
    }).setView([38, 60], 3);

        // Map tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors © CARTO',
            subdomains: 'abcd',
            noWrap: true, 
            bounds: [[-90, -180], [90, 180]]
        }).addTo(map);

        const students = [
            { name: "GERMO", country: "CHINA", coords: [35.8617, 104.1954], image: "germo.png" },
            { name: "RACHAEL", country: "CHINA", coords: [35.8817, 104.2154], image: "rachel.png" },
            { name: "REGAN", country: "CHINA", coords: [35.9017, 104.2354], image: "regan.png" },
            { name: "BRANDON", country: "HONGKONG", coords: [35.9217, 104.2554], image: "brandon.png" },
            { name: "EMMA", country: "CHINA", coords: [35.9417, 104.2754], image: "emma.png" }, 
            { name: "TIFFANY", country: "CHINA", coords: [35.9617, 104.2954], image: "tiffany.png" },
            { name: "DAVID", country: "CHINA", coords: [35.9817, 104.3154], image: "david.png" },
            { name: "EMRE", country: "TURKEY", coords: [38.9637, 35.2433], image: "emre.png" },
            { name: "ISKENDER", country: "TURKEY", coords: [38.9837, 35.2633], image: "iskender.png" },
            { name: "EFNAN", country: "TURKEY", coords: [39.0037, 35.2833], image: "efnan.png" },
            { name: "BERRA", country: "TURKEY", coords: [39.0237, 35.3033], image: "berra.png" },
            { name: "BEREN", country: "TURKEY", coords: [39.0437, 35.3233], image: "beren.png" },
            { name: "ZEYNEP", country: "TURKEY", coords: [39.0637, 35.3433], image: "zeynep.png" },
            { name: "ELA", country: "TURKEY", coords: [39.0837, 35.3633], image: "ela.png" },
            { name: "KORAY", country: "TURKEY", coords: [39.1037, 35.3833], image: "koray.png" },
            { name: "CEM", country: "TURKEY", coords: [39.1237, 35.4033], image: "cem.png" },
            { name: "YUSRA", country: "TURKEY", coords: [39.1437, 35.4233], image: "yusra.png" },
            { name: "KIRA", country: "TAIWAN", coords: [23.6978, 120.9605], image: "kira.png" },
            { name: "YULI", country: "TAIWAN", coords: [23.7178, 120.9805], image: "yuli.png" },
            { name: "RICHARD", country: "TAIWAN", coords: [23.7378, 121.0005], image: "richard.png" },
            { name: "KONSTANTINOS", country: "GREECE", coords: [39.0742, 21.8243], image: "konstantinos.png" },
            { name: "PARIS", country: "GREECE", coords: [39.0942, 21.8443], image: "paris.png" },
            { name: "NOELYS", country: "FRANCE", coords: [46.2276, 2.2137], image: "noelys.png" },
            { name: "ABDENNOUR", country: "FRANCE", coords: [46.2476, 2.2337], image: "abdennour.png" },
            { name: "MIIA", country: "RUSSIA", coords: [61.5240, 105.3188], image: "miia.png" },
            { name: "ANDREI", country: "RUSSIA", coords: [61.5440, 105.3388], image: "andrei.png" },
            { name: "SOPHIE", country: "SPAIN", coords: [40.4637, -3.7492], image: "sophie.png" },
            { name: "SILVIA", country: "SPAIN", coords: [40.4837, -3.7292], image: "silvia.png" },
            { name: "DAVUD", country: "AZERBAIJAN", coords: [40.1431, 47.5769], image: "davud.png" },
            { name: "SELBI", country: "KYRGYZSTAN", coords: [41.2044, 74.7661], image: "selbi.png" },
            { name: "AVICENNA", country: "IRAN", coords: [32.4279, 53.6880], image: "avicenna.png" },
            { name: "MARGOT", country: "ITALY", coords: [41.8719, 12.5674], image: "margot.png" },
            { name: "SIMONA", country: "SERBIA", coords: [44.0165, 21.0059], image: "simona.png" },
            { name: "RAYMOND", country: "NEW ZEALAND", coords: [-40.9006, 174.8860], image: "raymond.png" },
            { name: "ABDULLA", country: "QATAR", coords: [25.3548, 51.1839], image: "abdulla.png" },
            { name: "TERO", country: "SOUTH KOREA", coords: [35.9078, 127.7669], image: "tero.png" },
            { name: "ERIC", country: "UKRAINE", coords: [48.3794, 31.1656], image: "eric.png" },
            { name: "YAYA", country: "THAILAND", coords: [15.8700, 100.9925], image: "yaya.png" },
            { name: "DIYAR", country: "UAE", coords: [23.4241, 53.8478], image: "diyar.png" }
        ];
        
        students.forEach(student => {
            const marker = L.marker(student.coords).addTo(map);
            
            const popupContent = `
                <div class="student-popup">
                    <img src="${student.image}" alt="${student.name}">
                    <h3>${student.name}</h3>
                    <p>Country: ${student.country}</p>
                </div>
            `;
            
            marker.bindPopup(popupContent);
        });
    </script>
</body>
</html>
